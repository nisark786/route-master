name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: write

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}
  RELEASE_NAME: route-management
  DEPLOY_NAMESPACE: route-prod

jobs:
  frontend:
    name: Frontend Lint And Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/route_management/package-lock.json

      - name: Install Dependencies
        working-directory: frontend/route_management
        run: npm ci

      - name: Lint
        working-directory: frontend/route_management
        run: npm run lint

      - name: Build
        working-directory: frontend/route_management
        run: npm run build

  backend:
    name: Backend Pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: route_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d route_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DEBUG: "True"
      SECRET_KEY: ci-secret-key
      DB_ENGINE: django.contrib.gis.db.backends.postgis
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      DB_NAME: route_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable
      DB_ADMIN_DB: postgres
      USE_REDIS_CACHE: "False"
      SEND_OTP_ASYNC: "False"
      AI_AUTOSYNC_ENABLED: "False"
      CELERY_TASK_ALWAYS_EAGER: "True"
      CELERY_BROKER_URL: memory://
      CELERY_RESULT_BACKEND: cache+memory://
      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: core_services/requirements.txt

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libproj-dev binutils

      - name: Install Python Dependencies
        run: pip install -r core_services/requirements.txt

      - name: Run Pytest
        working-directory: core_services
        run: pytest -vv -x

  ai-service:
    name: AI Service Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai_service/requirements.txt

      - name: Install Dependencies
        run: pip install -r ai_service/requirements.txt

      - name: Syntax Check
        run: python -m compileall ai_service

  infra:
    name: Helm And Infra Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python Syntax Check
        run: python -m compileall infra

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Helm Lint
        run: helm lint infra/k8s/helm/route-management

      - name: Helm Template Smoke
        run: |
          helm template route-management infra/k8s/helm/route-management \
            -f infra/k8s/helm/route-management/values.yaml \
            -f infra/k8s/values/staging.yaml > /tmp/staging-rendered.yaml
          helm template route-management infra/k8s/helm/route-management \
            -f infra/k8s/helm/route-management/values.yaml \
            -f infra/k8s/values/production.yaml \
            -f infra/k8s/values/production.private.example.yaml > /tmp/production-rendered.yaml

  docker-builds:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            dockerfile: core_services/Dockerfile.prod
            context: core_services
          - name: ai-service
            dockerfile: ai_service/Dockerfile.prod
            context: ai_service
          - name: frontend
            dockerfile: frontend/route_management/Dockerfile.prod
            context: frontend/route_management
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: false

  deploy-production:
    name: Build And Deploy Production
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: [frontend, backend, ai-service, infra, docker-builds]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build And Push Backend
        uses: docker/build-push-action@v6
        with:
          context: core_services
          file: core_services/Dockerfile.prod
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_PREFIX }}/route-management-backend:${{ github.sha }}

      - name: Build And Push AI Service
        uses: docker/build-push-action@v6
        with:
          context: ai_service
          file: ai_service/Dockerfile.prod
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_PREFIX }}/route-management-ai-service:${{ github.sha }}

      - name: Build And Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend/route_management
          file: frontend/route_management/Dockerfile.prod
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_PREFIX }}/route-management-frontend:${{ github.sha }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.2

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.PROD_KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Pre-deploy auth/addon/secret checks
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace("${{ secrets.PROD_PRIVATE_VALUES_YAML }}")) {
            throw "PROD_PRIVATE_VALUES_YAML secret is empty."
          }

          if ("${{ secrets.PROD_PRIVATE_VALUES_YAML }}".Contains("__REQUIRED__")) {
            throw "PROD_PRIVATE_VALUES_YAML still contains __REQUIRED__ placeholders."
          }

          kubectl auth can-i get pods -n "$env:DEPLOY_NAMESPACE" | Out-Null

          $currentContext = kubectl config current-context
          if (($currentContext -like "arn:aws:eks:*") -and (Get-Command aws -ErrorAction SilentlyContinue)) {
            try {
              aws sts get-caller-identity | Out-Null
              $parts = $currentContext.Split(":")
              $region = $parts[3]
              $clusterName = $parts[$parts.Length - 1].Split("/")[1]
              $addons = aws eks list-addons --cluster-name $clusterName --region $region | ConvertFrom-Json
              if (-not ($addons.addons -contains "aws-ebs-csi-driver")) {
                throw "EKS addon aws-ebs-csi-driver is missing. Install it before deploy."
              }
            }
            catch {
              Write-Warning "Skipping EKS addon check because AWS CLI auth was not available in this runner context."
            }
          }

      - name: Write production private values
        run: |
          cat > /tmp/production.private.yaml <<'EOF'
          ${{ secrets.PROD_PRIVATE_VALUES_YAML }}
          EOF

      - name: Production readiness check
        shell: pwsh
        run: |
          ./infra/k8s/scripts/prod-readiness-check.ps1 `
            -ReleaseName "$env:RELEASE_NAME" `
            -ChartPath "./infra/k8s/helm/route-management" `
            -BaseValues "./infra/k8s/helm/route-management/values.yaml" `
            -ProdValues "./infra/k8s/values/production.yaml" `
            -PrivateValues "/tmp/production.private.yaml"

      - name: Deploy with Helm
        run: |
          helm upgrade --install $RELEASE_NAME infra/k8s/helm/route-management \
            -n $DEPLOY_NAMESPACE \
            --create-namespace \
            -f infra/k8s/helm/route-management/values.yaml \
            -f infra/k8s/values/production.yaml \
            -f /tmp/production.private.yaml \
            --set images.backend.repository=$IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-backend \
            --set images.backend.tag=${{ github.sha }} \
            --set images.aiService.repository=$IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-ai-service \
            --set images.aiService.tag=${{ github.sha }} \
            --set images.frontend.repository=$IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-frontend \
            --set images.frontend.tag=${{ github.sha }} \
            --wait --timeout 20m

      - name: Post-deploy smoke check
        run: |
          kubectl run smoke-prod-check -n $DEPLOY_NAMESPACE --rm -i --restart=Never \
            --image=curlimages/curl --command -- sh -lc "
              set -e
              curl -sS -o /dev/null -w 'gateway=%{http_code}\n' http://$RELEASE_NAME-gateway/healthz
              curl -sS -o /dev/null -w 'core=%{http_code}\n' http://$RELEASE_NAME-gateway/api/core/health/
              curl -sS -o /dev/null -w 'ai=%{http_code}\n' http://$RELEASE_NAME-gateway/api/ai/health
            "
