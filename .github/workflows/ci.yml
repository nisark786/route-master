name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/route_management/package-lock.json

      - name: Frontend Build
        working-directory: frontend/route_management
        run: |
          npm ci
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python Syntax Check
        run: |
          python -m compileall core_services
          python -m compileall ai_service
          python -m compileall infra

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Helm Lint
        run: |
          helm lint infra/k8s/helm/route-management

      - name: Helm Template Smoke (Staging)
        run: |
          helm template route-management infra/k8s/helm/route-management \
            -f infra/k8s/helm/route-management/values.yaml \
            -f infra/k8s/values/staging.yaml > /tmp/staging-rendered.yaml
