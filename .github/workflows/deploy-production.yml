name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Existing immutable image tag to deploy. Leave empty to build and deploy the current commit SHA."
        required: false
        type: string
      namespace:
        description: "Kubernetes namespace"
        required: true
        default: "route-prod"
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}
  RELEASE_NAME: route-management
  DEPLOY_NAMESPACE: ${{ github.event.inputs.namespace || 'route-prod' }}

jobs:
  resolve-image-tag:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.out.outputs.image_tag }}
      should_build: ${{ steps.out.outputs.should_build }}
    steps:
      - name: Resolve Image Tag
        id: out
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.image_tag }}" ]]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build-images:
    if: ${{ needs.resolve-image-tag.outputs.should_build == 'true' }}
    runs-on: ubuntu-latest
    needs: resolve-image-tag
    steps:
      - name: Checkout triggering SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build And Push Backend
        uses: docker/build-push-action@v6
        with:
          context: core_services
          file: core_services/Dockerfile.prod
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_PREFIX }}/route-management-backend:${{ needs.resolve-image-tag.outputs.image_tag }}

      - name: Build And Push AI Service
        uses: docker/build-push-action@v6
        with:
          context: ai_service
          file: ai_service/Dockerfile.prod
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_PREFIX }}/route-management-ai-service:${{ needs.resolve-image-tag.outputs.image_tag }}

      - name: Build And Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend/route_management
          file: frontend/route_management/Dockerfile.prod
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_PREFIX }}/route-management-frontend:${{ needs.resolve-image-tag.outputs.image_tag }}

  deploy:
    if: ${{ always() && needs.resolve-image-tag.result == 'success' && (needs.build-images.result == 'success' || needs.build-images.result == 'skipped') }}
    runs-on: ubuntu-latest
    needs: [resolve-image-tag, build-images]
    environment: production
    steps:
      - name: Checkout triggering SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.2

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.PROD_KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Pre-deploy auth/addon/secret checks
        shell: pwsh
        env:
          PROD_PRIVATE_VALUES_YAML: ${{ secrets.PROD_PRIVATE_VALUES_YAML }}
        run: |
          if ([string]::IsNullOrWhiteSpace("${{ needs.resolve-image-tag.outputs.image_tag }}")) {
            throw "image_tag is required."
          }

          if ("${{ needs.resolve-image-tag.outputs.image_tag }}" -in @("latest", "staging-latest")) {
            throw "Production deploy requires an immutable image tag, not '${{ needs.resolve-image-tag.outputs.image_tag }}'."
          }

          if ([string]::IsNullOrWhiteSpace($env:PROD_PRIVATE_VALUES_YAML)) {
            throw "PROD_PRIVATE_VALUES_YAML secret is empty."
          }

          if ($env:PROD_PRIVATE_VALUES_YAML.Contains("__REQUIRED__")) {
            throw "PROD_PRIVATE_VALUES_YAML still contains __REQUIRED__ placeholders."
          }

          kubectl auth can-i get pods -n "$env:DEPLOY_NAMESPACE" | Out-Null

          $currentContext = kubectl config current-context
          if (($currentContext -like "arn:aws:eks:*") -and (Get-Command aws -ErrorAction SilentlyContinue)) {
            try {
              aws sts get-caller-identity | Out-Null
              $parts = $currentContext.Split(":")
              $region = $parts[3]
              $clusterName = $parts[$parts.Length - 1].Split("/")[1]
              $addons = aws eks list-addons --cluster-name $clusterName --region $region | ConvertFrom-Json
              if (-not ($addons.addons -contains "aws-ebs-csi-driver")) {
                throw "EKS addon aws-ebs-csi-driver is missing. Install it before deploy."
              }
            }
            catch {
              Write-Warning "Skipping EKS addon check because AWS CLI auth was not available in this runner context."
            }
          }

      - name: Write production private values
        env:
          PROD_PRIVATE_VALUES_YAML: ${{ secrets.PROD_PRIVATE_VALUES_YAML }}
        run: |
          printf '%s\n' "$PROD_PRIVATE_VALUES_YAML" > /tmp/production.private.yaml

      - name: Production readiness check
        shell: pwsh
        run: |
          ./infra/k8s/scripts/prod-readiness-check.ps1 `
            -ReleaseName "$env:RELEASE_NAME" `
            -ChartPath "./infra/k8s/helm/route-management" `
            -BaseValues "./infra/k8s/helm/route-management/values.yaml" `
            -ProdValues "./infra/k8s/values/production.yaml" `
            -PrivateValues "/tmp/production.private.yaml"

      - name: Deploy with Helm
        run: |
          helm upgrade --install $RELEASE_NAME infra/k8s/helm/route-management \
            -n $DEPLOY_NAMESPACE \
            --create-namespace \
            -f infra/k8s/helm/route-management/values.yaml \
            -f infra/k8s/values/production.yaml \
            -f /tmp/production.private.yaml \
            --set images.backend.repository=$IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-backend \
            --set images.backend.tag=${{ needs.resolve-image-tag.outputs.image_tag }} \
            --set images.aiService.repository=$IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-ai-service \
            --set images.aiService.tag=${{ needs.resolve-image-tag.outputs.image_tag }} \
            --set images.frontend.repository=$IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-frontend \
            --set images.frontend.tag=${{ needs.resolve-image-tag.outputs.image_tag }} \
            --wait --timeout 20m

      - name: Post-deploy smoke check
        run: |
          kubectl run smoke-prod-check -n $DEPLOY_NAMESPACE --rm -i --restart=Never \
            --image=curlimages/curl --command -- sh -lc "
              set -e
              curl -sS -o /dev/null -w 'gateway=%{http_code}\n' http://$RELEASE_NAME-gateway/healthz
              curl -sS -o /dev/null -w 'core=%{http_code}\n' http://$RELEASE_NAME-gateway/api/core/health/
              curl -sS -o /dev/null -w 'ai=%{http_code}\n' http://$RELEASE_NAME-gateway/api/ai/health
            "
