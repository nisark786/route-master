name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "core_services/**"
      - "ai_service/**"
      - "frontend/route_management/**"
      - "infra/k8s/**"
      - ".github/workflows/deploy-staging.yml"

permissions:
  contents: read
  packages: write

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}
  RELEASE_NAME: route-management
  NAMESPACE: route-staging

jobs:
  build-images:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Vars
        id: vars
        run: |
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + Push Backend
        run: |
          docker build -f core_services/Dockerfile.prod \
            -t $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-backend:${GITHUB_SHA} \
            core_services
          docker push $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-backend:${GITHUB_SHA}

      - name: Build + Push AI Service
        run: |
          docker build -f ai_service/Dockerfile.prod \
            -t $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-ai-service:${GITHUB_SHA} \
            ai_service
          docker push $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-ai-service:${GITHUB_SHA}

      - name: Build + Push Frontend
        run: |
          docker build -f frontend/route_management/Dockerfile.prod \
            -t $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-frontend:${GITHUB_SHA} \
            frontend/route_management
          docker push $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-frontend:${GITHUB_SHA}

  deploy:
    # Local Docker Desktop Kubernetes is only reachable from a self-hosted runner
    # running on the same machine/network.
    runs-on: self-hosted
    needs: build-images
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.2

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.STAGING_KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Write staging private values
        run: |
          cat > /tmp/staging.private.yaml <<'EOF'
          ${{ secrets.STAGING_PRIVATE_VALUES_YAML }}
          EOF

      - name: Deploy with Helm
        run: |
          helm upgrade --install $RELEASE_NAME infra/k8s/helm/route-management \
            -n $NAMESPACE \
            --create-namespace \
            -f infra/k8s/helm/route-management/values.yaml \
            -f infra/k8s/values/staging.yaml \
            -f /tmp/staging.private.yaml \
            --set images.backend.repository=$IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-backend \
            --set images.backend.tag=${{ needs.build-images.outputs.image_tag }} \
            --set images.aiService.repository=$IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-ai-service \
            --set images.aiService.tag=${{ needs.build-images.outputs.image_tag }} \
            --set images.frontend.repository=$IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-frontend \
            --set images.frontend.tag=${{ needs.build-images.outputs.image_tag }} \
            --wait --timeout 15m

      - name: Post-deploy smoke check
        run: |
          kubectl run smoke-staging-check -n $NAMESPACE --rm -i --restart=Never \
            --image=curlimages/curl --command -- sh -lc "
              set -e
              curl -sS -o /dev/null -w 'gateway=%{http_code}\n' http://$RELEASE_NAME-gateway/healthz
              curl -sS -o /dev/null -w 'core=%{http_code}\n' http://$RELEASE_NAME-gateway/api/core/health/
              curl -sS -o /dev/null -w 'ai=%{http_code}\n' http://$RELEASE_NAME-gateway/api/ai/health
            "
