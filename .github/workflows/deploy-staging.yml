name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      skip_build:
        description: "Skip image build/push and deploy using staging-latest tags"
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "core_services/**"
      - "ai_service/**"
      - "frontend/route_management/**"
      - "infra/k8s/**"
      - ".github/workflows/deploy-staging.yml"

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}
  RELEASE_NAME: route-management
  NAMESPACE: route-staging

jobs:
  resolve-image-tag:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.out.outputs.image_tag }}
    steps:
      - name: Resolve deploy image tag
        id: out
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.skip_build }}" == "true" ]]; then
            echo "image_tag=staging-latest" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

  build-images:
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_build) }}
    runs-on: ubuntu-latest
    needs: resolve-image-tag
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Vars
        id: vars
        run: |
          echo "image_tag=${{ needs.resolve-image-tag.outputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + Push Backend
        run: |
          docker build -f core_services/Dockerfile.prod \
            -t $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-backend:${{ needs.resolve-image-tag.outputs.image_tag }} \
            -t $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-backend:staging-latest \
            core_services
          docker push $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-backend:${{ needs.resolve-image-tag.outputs.image_tag }}
          docker push $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-backend:staging-latest

      - name: Build + Push AI Service
        run: |
          docker build -f ai_service/Dockerfile.prod \
            -t $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-ai-service:${{ needs.resolve-image-tag.outputs.image_tag }} \
            -t $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-ai-service:staging-latest \
            ai_service
          docker push $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-ai-service:${{ needs.resolve-image-tag.outputs.image_tag }}
          docker push $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-ai-service:staging-latest

      - name: Build + Push Frontend
        run: |
          docker build -f frontend/route_management/Dockerfile.prod \
            -t $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-frontend:${{ needs.resolve-image-tag.outputs.image_tag }} \
            -t $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-frontend:staging-latest \
            frontend/route_management
          docker push $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-frontend:${{ needs.resolve-image-tag.outputs.image_tag }}
          docker push $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-frontend:staging-latest

  deploy:
    # Local Docker Desktop Kubernetes is only reachable from a self-hosted runner
    # running on the same machine/network.
    runs-on: self-hosted
    needs: [resolve-image-tag, build-images]
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.2

      - name: Setup Helm (Windows self-hosted)
        shell: powershell
        run: |
          choco install kubernetes-helm --version=3.15.4 -y
          helm version

      - name: Use local kubeconfig (self-hosted)
        shell: powershell
        run: |
          $kubeConfigPath = Join-Path $env:USERPROFILE ".kube\config"
          if (-not (Test-Path $kubeConfigPath)) {
            throw "Local kubeconfig not found at $kubeConfigPath"
          }
          $env:KUBECONFIG = $kubeConfigPath
          Write-Host "Using local kubeconfig at $kubeConfigPath"
          kubectl cluster-info

      - name: Write staging private values
        shell: powershell
        run: |
          $privatePath = "C:\actions-runner\_work\_temp\staging.private.yaml"
          @"
          ${{ secrets.STAGING_PRIVATE_VALUES_YAML }}
          "@ | Out-File -FilePath $privatePath -Encoding utf8
          Write-Host "Private values written to $privatePath"

      - name: Ensure staging namespace exists
        shell: powershell
        run: |
          $existing = kubectl get namespace $env:NAMESPACE --ignore-not-found -o name
          if ([string]::IsNullOrWhiteSpace($existing)) {
            Write-Host "Namespace $env:NAMESPACE not found. Creating..."
            kubectl create namespace $env:NAMESPACE
          } else {
            Write-Host "Namespace $env:NAMESPACE already exists"
          }

      - name: Clean stale migration hook job
        shell: powershell
        run: |
          $jobName = "$env:RELEASE_NAME-backend-migrate"
          kubectl delete job $jobName -n $env:NAMESPACE --ignore-not-found=true

      - name: Pre-pull release images on self-hosted runner
        shell: powershell
        run: |
          $images = @(
            "$env:IMAGE_REGISTRY/$env:IMAGE_PREFIX/route-management-backend:${{ needs.resolve-image-tag.outputs.image_tag }}",
            "$env:IMAGE_REGISTRY/$env:IMAGE_PREFIX/route-management-ai-service:${{ needs.resolve-image-tag.outputs.image_tag }}",
            "$env:IMAGE_REGISTRY/$env:IMAGE_PREFIX/route-management-frontend:${{ needs.resolve-image-tag.outputs.image_tag }}"
          )

          foreach ($image in $images) {
            $ok = $false
            for ($i = 1; $i -le 3; $i++) {
              Write-Host "Pulling $image (attempt $i/3)"
              docker pull $image
              if ($LASTEXITCODE -eq 0) {
                $ok = $true
                break
              }
              Start-Sleep -Seconds (5 * $i)
            }
            if (-not $ok) {
              throw "Failed to pre-pull image: $image"
            }
          }

      - name: Recover pending Helm release lock
        shell: powershell
        run: |
          $statusJson = $null
          try {
            $statusJson = helm status $env:RELEASE_NAME -n $env:NAMESPACE -o json 2>$null
          }
          catch {
            Write-Host "Release not found yet; continuing."
            exit 0
          }
          if (-not $statusJson) {
            Write-Host "No existing release status found; continuing."
            exit 0
          }

          $statusObj = $statusJson | ConvertFrom-Json
          $currentStatus = [string]$statusObj.info.status
          Write-Host "Current Helm release status: $currentStatus"

          if (-not $currentStatus.StartsWith("pending-")) {
            Write-Host "Release is not pending; continuing."
            exit 0
          }

          $historyJson = helm history $env:RELEASE_NAME -n $env:NAMESPACE -o json
          $history = $historyJson | ConvertFrom-Json
          $lastDeployed = $history | Where-Object { $_.status -eq "deployed" } | Select-Object -Last 1

          if ($null -ne $lastDeployed) {
            Write-Host "Pending lock detected. Rolling back to revision $($lastDeployed.revision)"
            helm rollback $env:RELEASE_NAME $lastDeployed.revision -n $env:NAMESPACE --wait --timeout 10m
          }
          else {
            Write-Host "Pending lock detected with no deployed revision. Uninstalling release to recover."
            helm uninstall $env:RELEASE_NAME -n $env:NAMESPACE
          }

      - name: Deploy with Helm
        shell: powershell
        run: |
          $privatePath = "C:\actions-runner\_work\_temp\staging.private.yaml"
          helm upgrade --install $env:RELEASE_NAME infra/k8s/helm/route-management `
            -n $env:NAMESPACE `
            -f infra/k8s/helm/route-management/values.yaml `
            -f infra/k8s/values/staging.yaml `
            -f $privatePath `
            --set images.backend.repository=$env:IMAGE_REGISTRY/$env:IMAGE_PREFIX/route-management-backend `
            --set images.backend.tag=${{ needs.resolve-image-tag.outputs.image_tag }} `
            --set images.aiService.repository=$env:IMAGE_REGISTRY/$env:IMAGE_PREFIX/route-management-ai-service `
            --set images.aiService.tag=${{ needs.resolve-image-tag.outputs.image_tag }} `
            --set images.frontend.repository=$env:IMAGE_REGISTRY/$env:IMAGE_PREFIX/route-management-frontend `
            --set images.frontend.tag=${{ needs.resolve-image-tag.outputs.image_tag }} `
            --wait --timeout 30m

      - name: Post-deploy smoke check
        shell: powershell
        run: |
          $serviceName = "$env:RELEASE_NAME-gateway"
          kubectl get svc $serviceName -n $env:NAMESPACE | Out-Null

          $pf = Start-Process -FilePath "kubectl" `
            -ArgumentList @("port-forward","-n",$env:NAMESPACE,"svc/$serviceName","18080:80") `
            -PassThru -WindowStyle Hidden

          function Test-Endpoint {
            param(
              [string]$Path,
              [int]$MaxAttempts = 30
            )

            for ($i = 1; $i -le $MaxAttempts; $i++) {
              try {
                $resp = Invoke-WebRequest -Uri ("http://127.0.0.1:18080" + $Path) -Method Get -TimeoutSec 5
                if ($resp.StatusCode -eq 200) {
                  Write-Host "$Path => 200"
                  return
                }
                Write-Host "$Path => $($resp.StatusCode) (attempt $i/$MaxAttempts)"
              }
              catch {
                Write-Host "$Path => not ready (attempt $i/$MaxAttempts)"
              }
              Start-Sleep -Seconds 2
            }

            throw "Smoke check failed for path: $Path"
          }

          try {
            Start-Sleep -Seconds 4
            Test-Endpoint -Path "/healthz"
            Test-Endpoint -Path "/api/core/health/"
            Test-Endpoint -Path "/api/ai/health"
          }
          finally {
            if ($pf -and -not $pf.HasExited) {
              Stop-Process -Id $pf.Id -Force
            }
          }
