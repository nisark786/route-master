name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Existing immutable image tag to deploy to staging. Leave empty to build from current commit."
        required: false
        type: string

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}
  RELEASE_NAME: route-management
  NAMESPACE: route-staging
  STAGING_PRIVATE_VALUES_RAW: ${{ secrets.STAGING_PRIVATE_VALUES_YAML }}

jobs:
  resolve-image-tag:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.out.outputs.image_tag }}
      should_build: ${{ steps.out.outputs.should_build }}
    steps:
      - name: Resolve Image Tag
        id: out
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.image_tag }}" ]]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build-images:
    if: ${{ needs.resolve-image-tag.outputs.should_build == 'true' }}
    runs-on: ubuntu-latest
    needs: resolve-image-tag
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build And Push Backend
        uses: docker/build-push-action@v6
        with:
          context: core_services
          file: core_services/Dockerfile.prod
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_PREFIX }}/route-management-backend:${{ needs.resolve-image-tag.outputs.image_tag }}

      - name: Build And Push AI Service
        uses: docker/build-push-action@v6
        with:
          context: ai_service
          file: ai_service/Dockerfile.prod
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_PREFIX }}/route-management-ai-service:${{ needs.resolve-image-tag.outputs.image_tag }}

      - name: Build And Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend/route_management
          file: frontend/route_management/Dockerfile.prod
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_PREFIX }}/route-management-frontend:${{ needs.resolve-image-tag.outputs.image_tag }}

  deploy:
    runs-on: self-hosted
    needs: [resolve-image-tag, build-images]
    if: ${{ always() && needs.resolve-image-tag.result == 'success' && (needs.build-images.result == 'success' || needs.build-images.result == 'skipped') }}
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.2

      - name: Setup Helm (Windows self-hosted)
        shell: powershell
        run: |
          choco install kubernetes-helm --version=3.15.4 -y
          helm version

      - name: Setup AWS CLI (Windows self-hosted)
        shell: powershell
        run: |
          if (-not (Get-Command aws -ErrorAction SilentlyContinue)) {
            choco install awscli -y
          }
          aws --version

      - name: Use Local kubeconfig
        shell: powershell
        run: |
          $kubeConfigPath = Join-Path $env:USERPROFILE ".kube\config"
          if (-not (Test-Path $kubeConfigPath)) {
            throw "Local kubeconfig not found at $kubeConfigPath"
          }
          $env:KUBECONFIG = $kubeConfigPath
          kubectl cluster-info

      - name: Pre-deploy Checks
        shell: powershell
        run: |
          if ([string]::IsNullOrWhiteSpace($env:STAGING_PRIVATE_VALUES_RAW)) {
            throw "STAGING_PRIVATE_VALUES_YAML secret is empty."
          }

          if ($env:STAGING_PRIVATE_VALUES_RAW.Contains("__REQUIRED__")) {
            throw "STAGING_PRIVATE_VALUES_YAML still contains __REQUIRED__ placeholders."
          }

          aws sts get-caller-identity | Out-Null
          kubectl auth can-i get pods -n $env:NAMESPACE | Out-Null

      - name: Write Staging Private Values
        shell: powershell
        run: |
          $privatePath = "C:\actions-runner\_work\_temp\staging.private.yaml"
          @"
          ${{ secrets.STAGING_PRIVATE_VALUES_YAML }}
          "@ | Out-File -FilePath $privatePath -Encoding utf8

      - name: Ensure Staging Namespace Exists
        shell: powershell
        run: |
          $existing = kubectl get namespace $env:NAMESPACE --ignore-not-found -o name
          if ([string]::IsNullOrWhiteSpace($existing)) {
            kubectl create namespace $env:NAMESPACE
          }

      - name: Recover Pending Helm Release Lock
        shell: powershell
        run: |
          $statusJson = $null
          try {
            $statusJson = helm status $env:RELEASE_NAME -n $env:NAMESPACE -o json 2>$null
          }
          catch {
            exit 0
          }

          if (-not $statusJson) {
            exit 0
          }

          $statusObj = $statusJson | ConvertFrom-Json
          $currentStatus = [string]$statusObj.info.status
          if (-not $currentStatus.StartsWith("pending-")) {
            exit 0
          }

          $historyJson = helm history $env:RELEASE_NAME -n $env:NAMESPACE -o json
          $history = $historyJson | ConvertFrom-Json
          $lastDeployed = $history | Where-Object { $_.status -eq "deployed" } | Select-Object -Last 1

          if ($null -ne $lastDeployed) {
            helm rollback $env:RELEASE_NAME $lastDeployed.revision -n $env:NAMESPACE --wait --timeout 10m
          }
          else {
            helm uninstall $env:RELEASE_NAME -n $env:NAMESPACE
          }

      - name: Deploy With Helm
        shell: powershell
        run: |
          $privatePath = "C:\actions-runner\_work\_temp\staging.private.yaml"
          helm upgrade --install $env:RELEASE_NAME infra/k8s/helm/route-management `
            -n $env:NAMESPACE `
            -f infra/k8s/helm/route-management/values.yaml `
            -f infra/k8s/values/staging.yaml `
            -f $privatePath `
            --set images.backend.repository=$env:IMAGE_REGISTRY/$env:IMAGE_PREFIX/route-management-backend `
            --set images.backend.tag=${{ needs.resolve-image-tag.outputs.image_tag }} `
            --set images.aiService.repository=$env:IMAGE_REGISTRY/$env:IMAGE_PREFIX/route-management-ai-service `
            --set images.aiService.tag=${{ needs.resolve-image-tag.outputs.image_tag }} `
            --set images.frontend.repository=$env:IMAGE_REGISTRY/$env:IMAGE_PREFIX/route-management-frontend `
            --set images.frontend.tag=${{ needs.resolve-image-tag.outputs.image_tag }} `
            --wait --timeout 30m

      - name: Post-deploy Smoke Check
        shell: powershell
        run: |
          $serviceName = "$env:RELEASE_NAME-gateway"
          kubectl get svc $serviceName -n $env:NAMESPACE | Out-Null

          $pf = Start-Process -FilePath "kubectl" `
            -ArgumentList @("port-forward","-n",$env:NAMESPACE,"svc/$serviceName","18080:80") `
            -PassThru -WindowStyle Hidden

          function Test-Endpoint {
            param(
              [string]$Path,
              [int]$MaxAttempts = 30
            )

            for ($i = 1; $i -le $MaxAttempts; $i++) {
              try {
                $resp = Invoke-WebRequest -Uri ("http://127.0.0.1:18080" + $Path) -Method Get -TimeoutSec 5
                if ($resp.StatusCode -eq 200) {
                  return
                }
              }
              catch {}
              Start-Sleep -Seconds 2
            }

            throw "Smoke check failed for path: $Path"
          }

          try {
            Start-Sleep -Seconds 4
            Test-Endpoint -Path "/healthz"
            Test-Endpoint -Path "/api/core/health/"
            Test-Endpoint -Path "/api/ai/health"
          }
          finally {
            if ($pf -and -not $pf.HasExited) {
              Stop-Process -Id $pf.Id -Force
            }
          }
