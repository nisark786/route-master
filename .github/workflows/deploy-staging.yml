name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "core_services/**"
      - "ai_service/**"
      - "frontend/route_management/**"
      - "infra/k8s/**"
      - ".github/workflows/deploy-staging.yml"

permissions:
  contents: read
  packages: write

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}
  RELEASE_NAME: route-management
  NAMESPACE: route-staging

jobs:
  build-images:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Vars
        id: vars
        run: |
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + Push Backend
        run: |
          docker build -f core_services/Dockerfile.prod \
            -t $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-backend:${GITHUB_SHA} \
            core_services
          docker push $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-backend:${GITHUB_SHA}

      - name: Build + Push AI Service
        run: |
          docker build -f ai_service/Dockerfile.prod \
            -t $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-ai-service:${GITHUB_SHA} \
            ai_service
          docker push $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-ai-service:${GITHUB_SHA}

      - name: Build + Push Frontend
        run: |
          docker build -f frontend/route_management/Dockerfile.prod \
            -t $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-frontend:${GITHUB_SHA} \
            frontend/route_management
          docker push $IMAGE_REGISTRY/$IMAGE_PREFIX/route-management-frontend:${GITHUB_SHA}

  deploy:
    # Local Docker Desktop Kubernetes is only reachable from a self-hosted runner
    # running on the same machine/network.
    runs-on: self-hosted
    needs: build-images
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.2

      - name: Setup Helm (Windows self-hosted)
        shell: powershell
        run: |
          choco install kubernetes-helm --version=3.15.4 -y
          helm version

      - name: Use local kubeconfig (self-hosted)
        shell: powershell
        run: |
          $kubeConfigPath = Join-Path $env:USERPROFILE ".kube\config"
          if (-not (Test-Path $kubeConfigPath)) {
            throw "Local kubeconfig not found at $kubeConfigPath"
          }
          $env:KUBECONFIG = $kubeConfigPath
          Write-Host "Using local kubeconfig at $kubeConfigPath"
          kubectl cluster-info

      - name: Write staging private values
        shell: powershell
        run: |
          $privatePath = "C:\actions-runner\_work\_temp\staging.private.yaml"
          @"
          ${{ secrets.STAGING_PRIVATE_VALUES_YAML }}
          "@ | Out-File -FilePath $privatePath -Encoding utf8
          Write-Host "Private values written to $privatePath"

      - name: Ensure staging namespace exists
        shell: powershell
        run: |
          $existing = kubectl get namespace $env:NAMESPACE --ignore-not-found -o name
          if ([string]::IsNullOrWhiteSpace($existing)) {
            Write-Host "Namespace $env:NAMESPACE not found. Creating..."
            kubectl create namespace $env:NAMESPACE
          } else {
            Write-Host "Namespace $env:NAMESPACE already exists"
          }

      - name: Clean stale migration hook job
        shell: powershell
        run: |
          $jobName = "$env:RELEASE_NAME-backend-migrate"
          kubectl delete job $jobName -n $env:NAMESPACE --ignore-not-found=true

      - name: Deploy with Helm
        shell: powershell
        run: |
          $privatePath = "C:\actions-runner\_work\_temp\staging.private.yaml"
          helm upgrade --install $env:RELEASE_NAME infra/k8s/helm/route-management `
            -n $env:NAMESPACE `
            -f infra/k8s/helm/route-management/values.yaml `
            -f infra/k8s/values/staging.yaml `
            -f $privatePath `
            --set images.backend.repository=$env:IMAGE_REGISTRY/$env:IMAGE_PREFIX/route-management-backend `
            --set images.backend.tag=${{ needs.build-images.outputs.image_tag }} `
            --set images.aiService.repository=$env:IMAGE_REGISTRY/$env:IMAGE_PREFIX/route-management-ai-service `
            --set images.aiService.tag=${{ needs.build-images.outputs.image_tag }} `
            --set images.frontend.repository=$env:IMAGE_REGISTRY/$env:IMAGE_PREFIX/route-management-frontend `
            --set images.frontend.tag=${{ needs.build-images.outputs.image_tag }} `
            --wait --timeout 15m

      - name: Post-deploy smoke check
        shell: powershell
        run: |
          kubectl run smoke-staging-check -n $env:NAMESPACE --rm -i --restart=Never `
            --image=curlimages/curl --command -- sh -lc "set -e; curl -sS -o /dev/null -w 'gateway=%{http_code}\n' http://$env:RELEASE_NAME-gateway/healthz; curl -sS -o /dev/null -w 'core=%{http_code}\n' http://$env:RELEASE_NAME-gateway/api/core/health/; curl -sS -o /dev/null -w 'ai=%{http_code}\n' http://$env:RELEASE_NAME-gateway/api/ai/health"
