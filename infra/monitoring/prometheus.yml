global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/prometheus-alert-rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: core_service
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8000

  - job_name: ai_service
    metrics_path: /metrics
    static_configs:
      - targets:
          - ai_service:8001

  - job_name: redis_exporter
    static_configs:
      - targets:
          - redis_exporter:9121

  - job_name: rabbitmq_exporter
    static_configs:
      - targets:
          - rabbitmq_exporter:9419

  - job_name: postgres_core_exporter
    static_configs:
      - targets:
          - postgres_exporter_core:9187

  - job_name: postgres_ai_exporter
    static_configs:
      - targets:
          - postgres_exporter_ai:9187

  - job_name: mongodb_exporter
    static_configs:
      - targets:
          - mongodb_exporter:9216
