global:
  createNamespace: true
  namespaceOverride: route-prod

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: localhost
      paths:
        - path: /api
          pathType: Prefix
          service: gateway
          port: 80
        - path: /ws
          pathType: Prefix
          service: gateway
          port: 80
        - path: /
          pathType: Prefix
          service: frontend
          port: 80
  tls: []

config:
  core:
    DEBUG: "False"
    ALLOWED_HOSTS: "localhost,127.0.0.1"
    CORS_ALLOWED_ORIGINS: "http://localhost,http://127.0.0.1"
    USE_S3_MEDIA: "True"
    AWS_S3_MEDIA_PREFIX: "media"
    AWS_QUERYSTRING_AUTH: "False"
  ai:
    EMBEDDING_PROVIDER: "huggingface"
    QDRANT_COLLECTION: "route_docs_prod"

backend:
  replicas: 1
  resources:
    requests:
      cpu: 75m
      memory: 256Mi
    limits:
      cpu: 400m
      memory: 768Mi
  autoscaling:
    enabled: false

