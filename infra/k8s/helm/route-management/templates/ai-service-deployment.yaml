apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "route-management.fullname" . }}-ai-service
  namespace: {{ include "route-management.namespace" . }}
  labels:
    {{- include "route-management.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai-service
spec:
  replicas: {{ .Values.aiService.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      {{- include "route-management.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ai-service
  template:
    metadata:
      labels:
        {{- include "route-management.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ai-service
    spec:
      serviceAccountName: {{ include "route-management.serviceAccountName" . }}
      containers:
        - name: ai-service
          image: "{{ .Values.images.aiService.repository }}:{{ .Values.images.aiService.tag }}"
          imagePullPolicy: {{ .Values.images.aiService.pullPolicy }}
          command:
            - uvicorn
          args:
            - app.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8001"
            - --workers
            - "2"
          ports:
            - containerPort: {{ .Values.aiService.service.port }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "route-management.fullname" . }}-ai-config
            - secretRef:
                name: {{ include "route-management.fullname" . }}-app-secrets
          startupProbe:
            httpGet:
              path: /health
              port: http
            timeoutSeconds: 30
            failureThreshold: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 30
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 30
            failureThreshold: 6
          resources:
            {{- toYaml .Values.aiService.resources | nindent 12 }}
---
