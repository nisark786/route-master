apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "route-management.fullname" . }}-core-config
  namespace: {{ include "route-management.namespace" . }}
  labels:
    {{- include "route-management.labels" . | nindent 4 }}
data:
  DEBUG: {{ .Values.config.core.DEBUG | quote }}
  ALLOWED_HOSTS: {{ .Values.config.core.ALLOWED_HOSTS | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.config.core.CORS_ALLOWED_ORIGINS | quote }}
  DB_ENGINE: {{ .Values.config.core.DB_ENGINE | quote }}
  DB_HOST: {{ ternary .Values.externalServices.postgresCore.host (printf "%s-postgres-core" (include "route-management.fullname" .)) .Values.externalServices.postgresCore.enabled | quote }}
  DB_PORT: {{ ternary (.Values.externalServices.postgresCore.port | toString) .Values.config.core.DB_PORT .Values.externalServices.postgresCore.enabled | quote }}
  DB_NAME: {{ .Values.config.core.DB_NAME | quote }}
  DB_USER: {{ .Values.config.core.DB_USER | quote }}
  DB_SSLMODE: {{ .Values.config.core.DB_SSLMODE | quote }}
  REDIS_URL: {{ ternary .Values.externalServices.redis.url (printf "redis://%s-redis:%v/1" (include "route-management.fullname" .) .Values.redis.service.port) .Values.externalServices.redis.enabled | quote }}
  USE_REDIS_CACHE: {{ .Values.config.core.USE_REDIS_CACHE | quote }}
  CELERY_BROKER_URL: {{ ternary .Values.externalServices.rabbitmq.brokerUrl (printf "amqp://%s:%s@%s-rabbitmq:%s/%s" .Values.secrets.rabbitmq.username .Values.secrets.rabbitmq.password (include "route-management.fullname" .) (.Values.rabbitmq.service.amqpPort | toString) .Values.secrets.rabbitmq.vhost) .Values.externalServices.rabbitmq.enabled | quote }}
  CELERY_RESULT_BACKEND: {{ default (ternary .Values.externalServices.redis.url (printf "redis://%s-redis:%v/1" (include "route-management.fullname" .) .Values.redis.service.port) .Values.externalServices.redis.enabled) .Values.config.core.CELERY_RESULT_BACKEND | quote }}
  MONGO_URI: {{ ternary .Values.externalServices.mongo.uri (printf "mongodb://%s-mongo:%v" (include "route-management.fullname" .) .Values.mongo.service.port) .Values.externalServices.mongo.enabled | quote }}
  MONGO_DB_NAME: {{ .Values.config.core.MONGO_DB_NAME | quote }}
  MONGO_LOCATIONS_COLLECTION: {{ .Values.config.core.MONGO_LOCATIONS_COLLECTION | quote }}
  SEND_OTP_ASYNC: {{ .Values.config.core.SEND_OTP_ASYNC | quote }}
  EMAIL_BACKEND: {{ .Values.config.core.EMAIL_BACKEND | quote }}
  EMAIL_HOST: {{ .Values.config.core.EMAIL_HOST | quote }}
  EMAIL_PORT: {{ .Values.config.core.EMAIL_PORT | quote }}
  EMAIL_USE_TLS: {{ .Values.config.core.EMAIL_USE_TLS | quote }}
  AI_AUTOSYNC_ENABLED: {{ .Values.config.core.AI_AUTOSYNC_ENABLED | quote }}
  AI_AUTOSYNC_INTERVAL_MINUTES: {{ .Values.config.core.AI_AUTOSYNC_INTERVAL_MINUTES | quote }}
  AI_SERVICE_URL: {{ printf "http://%s-ai-service:%v" (include "route-management.fullname" .) .Values.aiService.service.port | quote }}
  USE_S3_MEDIA: {{ .Values.config.core.USE_S3_MEDIA | quote }}
  AWS_S3_MEDIA_PREFIX: {{ .Values.config.core.AWS_S3_MEDIA_PREFIX | quote }}
  AWS_QUERYSTRING_AUTH: {{ .Values.config.core.AWS_QUERYSTRING_AUTH | quote }}
---
