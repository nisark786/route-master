{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "route-management.fullname" . }}-frontend
  namespace: {{ include "route-management.namespace" . }}
  labels:
    {{- include "route-management.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      {{- include "route-management.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "route-management.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: {{ include "route-management.serviceAccountName" . }}
      containers:
        - name: frontend
          image: "{{ .Values.images.frontend.repository }}:{{ .Values.images.frontend.tag }}"
          imagePullPolicy: {{ .Values.images.frontend.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "route-management.fullname" . }}-frontend-config
          env:
            - name: BACKEND_UPSTREAM
              value: {{ printf "http://%s-backend:%v" (include "route-management.fullname" .) .Values.backend.service.port | quote }}
            - name: AI_UPSTREAM
              value: {{ printf "http://%s-ai-service:%v" (include "route-management.fullname" .) .Values.aiService.service.port | quote }}
          ports:
            - containerPort: 80
              name: http
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
{{- end }}
---
