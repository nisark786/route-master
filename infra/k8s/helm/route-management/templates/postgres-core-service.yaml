apiVersion: v1
kind: Service
metadata:
  name: {{ include "route-management.fullname" . }}-postgres-core
  namespace: {{ include "route-management.namespace" . }}
  labels:
    {{- include "route-management.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "route-management.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-core
  ports:
    - name: postgres
      port: {{ .Values.postgresCore.service.port }}
      targetPort: postgres
---
