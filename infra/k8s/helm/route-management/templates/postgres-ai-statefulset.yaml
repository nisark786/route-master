{{- if and .Values.postgresAi.enabled (not .Values.externalServices.postgresAi.enabled) }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "route-management.fullname" . }}-postgres-ai
  namespace: {{ include "route-management.namespace" . }}
  labels:
    {{- include "route-management.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-ai
spec:
  serviceName: {{ include "route-management.fullname" . }}-postgres-ai
  replicas: {{ .Values.postgresAi.replicas }}
  selector:
    matchLabels:
      {{- include "route-management.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres-ai
  template:
    metadata:
      labels:
        {{- include "route-management.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres-ai
    spec:
      containers:
        - name: postgres-ai
          image: "{{ .Values.images.postgresAi.repository }}:{{ .Values.images.postgresAi.tag }}"
          imagePullPolicy: {{ .Values.images.postgresAi.pullPolicy }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.config.ai.AI_DB_NAME | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.config.ai.AI_DB_USER | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "route-management.fullname" . }}-app-secrets
                  key: AI_DB_PASSWORD
          ports:
            - containerPort: {{ .Values.postgresAi.service.port }}
              name: postgres
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.postgresAi.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.global.storageClass }}
        storageClassName: {{ .Values.global.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgresAi.persistence.size }}
---
{{- end }}
