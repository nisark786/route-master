{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "route-management.fullname" . }}-prometheus-config
  namespace: {{ include "route-management.namespace" . }}
  labels:
    {{- include "route-management.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/prometheus-alert-rules.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['{{ include "route-management.fullname" . }}-prometheus:{{ .Values.prometheus.service.port }}']

      - job_name: core_service
        metrics_path: /metrics
        static_configs:
          - targets: ['{{ include "route-management.fullname" . }}-backend:{{ .Values.backend.service.port }}']

      - job_name: ai_service
        metrics_path: /metrics
        static_configs:
          - targets: ['{{ include "route-management.fullname" . }}-ai-service:{{ .Values.aiService.service.port }}']


      - job_name: redis_exporter
        static_configs:
          - targets: ['{{ include "route-management.fullname" . }}-redis-exporter:9121']

      - job_name: rabbitmq_exporter
        static_configs:
          - targets: ['{{ include "route-management.fullname" . }}-rabbitmq-exporter:9419']

      - job_name: postgres_core_exporter
        static_configs:
          - targets: ['{{ include "route-management.fullname" . }}-postgres-core-exporter:9187']

      - job_name: postgres_ai_exporter
        static_configs:
          - targets: ['{{ include "route-management.fullname" . }}-postgres-ai-exporter:9187']

      - job_name: mongodb_exporter
        static_configs:
          - targets: ['{{ include "route-management.fullname" . }}-mongodb-exporter:9216']
  prometheus-alert-rules.yml: |
    groups:
      - name: route-management
        rules:
          - alert: BackendDown
            expr: up{job="core_service"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: Backend is down
          - alert: AIServiceDown
            expr: up{job="ai_service"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: AI service is down
          - alert: RabbitMQQueueDepthHigh
            expr: sum(rabbitmq_queue_messages) > 1000
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: RabbitMQ queue depth is high
{{- end }}
---
