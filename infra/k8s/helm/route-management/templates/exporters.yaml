{{- if and .Values.mongo.enabled (not .Values.externalServices.mongo.enabled) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "route-management.fullname" . }}-mongodb-exporter
  namespace: {{ include "route-management.namespace" . }}
  labels:
    {{- include "route-management.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "route-management.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mongodb-exporter
  template:
    metadata:
      labels:
        {{- include "route-management.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mongodb-exporter
    spec:
      containers:
        - name: mongodb-exporter
          image: "{{ .Values.images.mongodbExporter.repository }}:{{ .Values.images.mongodbExporter.tag }}"
          imagePullPolicy: {{ .Values.images.mongodbExporter.pullPolicy }}
          args:
            - "--mongodb.uri=mongodb://{{ include "route-management.fullname" . }}-mongo:{{ .Values.mongo.service.port }}"
            - "--web.listen-address=:9216"
          ports:
            - containerPort: 9216
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "route-management.fullname" . }}-mongodb-exporter
  namespace: {{ include "route-management.namespace" . }}
spec:
  selector:
    {{- include "route-management.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb-exporter
  ports:
    - name: http
      port: 9216
      targetPort: http
{{- end }}
{{- end }}
---
