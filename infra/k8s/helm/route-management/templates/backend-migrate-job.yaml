apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "route-management.fullname" . }}-backend-migrate
  namespace: {{ include "route-management.namespace" . }}
  labels:
    {{- include "route-management.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "route-management.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration-job
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.images.backend.repository }}:{{ .Values.images.backend.tag }}"
          imagePullPolicy: {{ .Values.images.backend.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - >
              until nc -z {{ ternary .Values.externalServices.postgresCore.host (printf "%s-postgres-core" (include "route-management.fullname" .)) .Values.externalServices.postgresCore.enabled }} {{ ternary (.Values.externalServices.postgresCore.port | toString) (.Values.postgresCore.service.port | toString) .Values.externalServices.postgresCore.enabled }};
              do echo "waiting for postgres"; sleep 2; done
      containers:
        - name: backend-migrate
          image: "{{ .Values.images.backend.repository }}:{{ .Values.images.backend.tag }}"
          imagePullPolicy: {{ .Values.images.backend.pullPolicy }}
          command: ["python", "manage.py", "migrate", "--noinput"]
          envFrom:
            - configMapRef:
                name: {{ include "route-management.fullname" . }}-core-config
            - secretRef:
                name: {{ include "route-management.fullname" . }}-app-secrets
---
