apiVersion: v1
kind: Secret
metadata:
  name: {{ include "route-management.fullname" . }}-app-secrets
  namespace: {{ include "route-management.namespace" . }}
  labels:
    {{- include "route-management.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.secrets.core.SECRET_KEY | quote }}
  DB_PASSWORD: {{ .Values.secrets.core.DB_PASSWORD | quote }}
  RAZORPAY_KEY_ID: {{ .Values.secrets.core.RAZORPAY_KEY_ID | quote }}
  RAZORPAY_KEY_SECRET: {{ .Values.secrets.core.RAZORPAY_KEY_SECRET | quote }}
  EMAIL_HOST_USER: {{ .Values.secrets.core.EMAIL_HOST_USER | quote }}
  EMAIL_HOST_PASSWORD: {{ .Values.secrets.core.EMAIL_HOST_PASSWORD | quote }}
  DEFAULT_FROM_EMAIL: {{ .Values.secrets.core.DEFAULT_FROM_EMAIL | quote }}
  AWS_ACCESS_KEY_ID: {{ .Values.secrets.core.AWS_ACCESS_KEY_ID | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.core.AWS_SECRET_ACCESS_KEY | quote }}
  AWS_SESSION_TOKEN: {{ .Values.secrets.core.AWS_SESSION_TOKEN | quote }}
  AWS_STORAGE_BUCKET_NAME: {{ .Values.secrets.core.AWS_STORAGE_BUCKET_NAME | quote }}
  AWS_S3_REGION_NAME: {{ .Values.secrets.core.AWS_S3_REGION_NAME | quote }}
  AWS_S3_CUSTOM_DOMAIN: {{ .Values.secrets.core.AWS_S3_CUSTOM_DOMAIN | quote }}
  AI_INTERNAL_AUTH_SECRET: {{ .Values.secrets.core.AI_INTERNAL_AUTH_SECRET | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.ai.OPENAI_API_KEY | quote }}
  HUGGINGFACE_API_KEY: {{ .Values.secrets.ai.HUGGINGFACE_API_KEY | quote }}
  QDRANT_API_KEY: {{ .Values.secrets.ai.QDRANT_API_KEY | quote }}
  AI_DB_PASSWORD: {{ .Values.secrets.ai.AI_DB_PASSWORD | quote }}
  AUTH_JWT_SECRET: {{ .Values.secrets.ai.AUTH_JWT_SECRET | quote }}
  AUTH_INTERNAL_TOKEN_SECRET: {{ .Values.secrets.ai.AUTH_INTERNAL_TOKEN_SECRET | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "route-management.fullname" . }}-rabbitmq-secrets
  namespace: {{ include "route-management.namespace" . }}
  labels:
    {{- include "route-management.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.secrets.rabbitmq.username | quote }}
  password: {{ .Values.secrets.rabbitmq.password | quote }}
  vhost: {{ .Values.secrets.rabbitmq.vhost | quote }}
---
{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "route-management.fullname" . }}-grafana-secrets
  namespace: {{ include "route-management.namespace" . }}
  labels:
    {{- include "route-management.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-user: {{ .Values.secrets.grafana.adminUser | quote }}
  admin-password: {{ .Values.secrets.grafana.adminPassword | quote }}
---
{{- end }}
