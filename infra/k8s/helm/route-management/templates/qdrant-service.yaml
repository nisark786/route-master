apiVersion: v1
kind: Service
metadata:
  name: {{ include "route-management.fullname" . }}-qdrant
  namespace: {{ include "route-management.namespace" . }}
  labels:
    {{- include "route-management.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "route-management.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
  ports:
    - name: http
      port: {{ .Values.qdrant.service.httpPort }}
      targetPort: http
    - name: grpc
      port: {{ .Values.qdrant.service.grpcPort }}
      targetPort: grpc
---
