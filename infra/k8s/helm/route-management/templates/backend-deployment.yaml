apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "route-management.fullname" . }}-backend
  namespace: {{ include "route-management.namespace" . }}
  labels:
    {{- include "route-management.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "route-management.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "route-management.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: {{ include "route-management.serviceAccountName" . }}
      containers:
        - name: backend
          image: "{{ .Values.images.backend.repository }}:{{ .Values.images.backend.tag }}"
          imagePullPolicy: {{ .Values.images.backend.pullPolicy }}
          command: ["daphne", "-b", "0.0.0.0", "-p", "8000", "config.asgi:application"]
          ports:
            - containerPort: {{ .Values.backend.service.port }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "route-management.fullname" . }}-core-config
            - secretRef:
                name: {{ include "route-management.fullname" . }}-app-secrets
          env:
            - name: RUN_MIGRATIONS
              value: "false"
          startupProbe:
            httpGet:
              path: /health/
              port: http
              httpHeaders:
                - name: Host
                  value: {{ .Values.backend.probes.hostHeader | quote }}
            timeoutSeconds: 5
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/
              port: http
              httpHeaders:
                - name: Host
                  value: {{ .Values.backend.probes.hostHeader | quote }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/
              port: http
              httpHeaders:
                - name: Host
                  value: {{ .Values.backend.probes.hostHeader | quote }}
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
---
