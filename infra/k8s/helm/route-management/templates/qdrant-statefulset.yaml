{{- if and .Values.qdrant.enabled (not .Values.externalServices.qdrant.enabled) }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "route-management.fullname" . }}-qdrant
  namespace: {{ include "route-management.namespace" . }}
  labels:
    {{- include "route-management.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  serviceName: {{ include "route-management.fullname" . }}-qdrant
  replicas: {{ .Values.qdrant.replicas }}
  selector:
    matchLabels:
      {{- include "route-management.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: qdrant
  template:
    metadata:
      labels:
        {{- include "route-management.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: qdrant
    spec:
      containers:
        - name: qdrant
          image: "{{ .Values.images.qdrant.repository }}:{{ .Values.images.qdrant.tag }}"
          imagePullPolicy: {{ .Values.images.qdrant.pullPolicy }}
          ports:
            - containerPort: {{ .Values.qdrant.service.httpPort }}
              name: http
            - containerPort: {{ .Values.qdrant.service.grpcPort }}
              name: grpc
          volumeMounts:
            - name: data
              mountPath: /qdrant/storage
          resources:
            {{- toYaml .Values.qdrant.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.global.storageClass }}
        storageClassName: {{ .Values.global.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.qdrant.persistence.size }}
---
{{- end }}
